name: Deploy site to GitHub Pages

# Publishes the static landing page in docs/ to GitHub Pages on every push to
# main. In the repo: Settings → Pages → Build and deployment → Source =
# "GitHub Actions" (this workflow does the rest).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build type = GitHub Actions) on first run, so you
          # don't have to toggle it in Settings first. Avoids the "Get Pages site
          # failed / Not Found" error when Pages hasn't been enabled yet.
          enablement: true
      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
